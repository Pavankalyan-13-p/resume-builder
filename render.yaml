services:
  - type: web
    name: resume-pdf-server
    runtime: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: NODE_ENV
        value: production
